name: Access requests

# Self-service access to the private CSTP course content repo(s):
#   1. Someone opens an access request (issue form) with their work email.
#   2. If the email is @infopercept.com, a 6-digit code is sent to it and the
#      email is redacted from the public issue. Any other domain: auto-closed.
#   3. The requester replies with the code; if it matches, their GitHub
#      account is invited with read-only access to every repo listed in
#      CONTENT_REPOS below, and the request is closed.
#
# Secrets: CODE_KEY (HMAC key), MAIL_USERNAME / MAIL_PASSWORD (Office 365),
#          GH_PAT (fine-grained PAT with Administration:write on EVERY repo
#          listed in CONTENT_REPOS — when a new module's content repo is
#          added below, the PAT's repo access must be updated too).

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write

env:
  # Comma-separated list — one verified request grants access to every repo here.
  # Adding a new module: append its content repo (and give GH_PAT access to it).
  CONTENT_REPOS: divyesh-vaishnav-im/CSTP-Module1-Content

jobs:
  send-code:
    name: Validate the request and email a code
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'access-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check the email domain
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = context.payload.issue.body || '';
            const match = body.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);
            const email = match ? match[0].toLowerCase() : '';
            const domains = JSON.parse(fs.readFileSync('config/allowed-domains.json', 'utf8'))
              .domains.map((d) => String(d).toLowerCase());
            const ok = email !== '' && domains.some((d) => email.endsWith('@' + d));
            core.setOutput('ok', ok ? 'yes' : 'no');
            core.setOutput('email', ok ? email : '');
            core.setOutput('domains', domains.map((d) => '**@' + d + '**').join(', '));

      - name: Close requests from other domains
        if: steps.parse.outputs.ok == 'no'
        uses: actions/github-script@v7
        env:
          DOMAINS: ${{ steps.parse.outputs.domains }}
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `Sorry — access is only available for work email addresses on: ${process.env.DOMAINS}. `
                + 'If you have one, open a new request and enter it exactly.',
            });
            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: 'closed',
              body: '*(Request closed — the email address is not on an approved domain.)*',
            });

      - name: Email the verification code
        if: steps.parse.outputs.ok == 'yes'
        env:
          CODE_KEY: ${{ secrets.CODE_KEY }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          TO_EMAIL: ${{ steps.parse.outputs.email }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          AUTHOR: ${{ github.event.issue.user.login }}
        run: |
          npm install --no-fund --no-audit --loglevel=error
          node scripts/send-code.js

      - name: Redact the email and post instructions
        if: steps.parse.outputs.ok == 'yes'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              body: '*(Email address redacted after processing ✅)*',
            });
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `📩 @${context.payload.issue.user.login} — a **6-digit verification code** has been sent to your `
                + 'work inbox (1–2 minutes; check junk/spam too).\n\n'
                + '**Reply to this request with just the code** and your access is granted automatically.\n\n'
                + '*Typed the wrong email? Close this request and open a new one.*',
            });

      - name: Report a problem on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: '⚠️ Something went wrong while processing this request — please contact Divyesh Vaishnav directly.',
            });

  verify:
    name: Verify the code and grant access
    if: >
      github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'access-request') &&
      github.event.comment.user.login == github.event.issue.user.login
    runs-on: ubuntu-latest
    steps:
      - name: Check the code
        id: check
        env:
          CODE_KEY: ${{ secrets.CODE_KEY }}
        uses: actions/github-script@v7
        with:
          script: |
            const crypto = require('crypto');
            const match = (context.payload.comment.body || '').match(/\b(\d{6})\b/);
            if (!match) { core.setOutput('result', 'ignore'); return; } // ordinary comment, not a code

            const hex = crypto.createHmac('sha256', process.env.CODE_KEY)
              .update(`${context.payload.issue.number}:${context.payload.issue.user.login}`)
              .digest('hex');
            const expected = String(parseInt(hex.slice(0, 12), 16) % 1000000).padStart(6, '0');

            if (crypto.timingSafeEqual(Buffer.from(match[1]), Buffer.from(expected))) {
              core.setOutput('result', 'ok');
              return;
            }
            const comments = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.payload.issue.number, per_page: 100,
            });
            const failed = comments.data.filter((c) =>
              c.user.type === 'Bot' && c.body.includes('does not match')).length;
            core.setOutput('result', failed >= 4 ? 'lockout' : 'wrong');

      - name: Grant read access
        if: steps.check.outputs.result == 'ok'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          USERNAME: ${{ github.event.issue.user.login }}
        run: |
          IFS=',' read -ra REPOS <<< "$CONTENT_REPOS"
          for repo in "${REPOS[@]}"; do
            gh api --method PUT "repos/$repo/collaborators/$USERNAME" -f permission=pull
          done

      - name: Confirm and close
        if: steps.check.outputs.result == 'ok'
        uses: actions/github-script@v7
        with:
          script: |
            const user = context.payload.issue.user.login;
            const repos = process.env.CONTENT_REPOS.split(',').map((r) => r.trim());
            const plural = repos.length > 1;
            const links = repos.map((r) => `https://github.com/${r}/invitations`).join('\n');
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: `✅ Verified! @${user} has been invited with **read access** to the course repositor${plural ? 'ies' : 'y'}.\n\n`
                + `**One last step:** accept the invitation${plural ? 's' : ''} — check the email${plural ? 's' : ''} GitHub just sent you, or open:\n${links}\n\n`
                + `*Invitation${plural ? 's' : ''} expire${plural ? '' : 's'} in 7 days. If ${plural ? 'one expires' : 'it expires'}, just open a new access request.*`,
            });
            await github.rest.issues.update({
              ...context.repo, issue_number: context.payload.issue.number, state: 'closed',
            });

      - name: Wrong code
        if: steps.check.outputs.result == 'wrong'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: '❌ That code does not match — check the email again and reply with the exact 6-digit code.',
            });

      - name: Too many attempts
        if: steps.check.outputs.result == 'lockout'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: '🔒 Too many incorrect attempts — this request is closed. Open a new access request to try again.',
            });
            await github.rest.issues.update({
              ...context.repo, issue_number: context.payload.issue.number, state: 'closed',
            });

      - name: Report a problem on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.payload.issue.number,
              body: '⚠️ Something went wrong while granting access — please contact Divyesh Vaishnav directly.',
            });
